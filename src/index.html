<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .logo-wrap{display:flex;justify-content:center;align-items:center;width:100%;margin-bottom:1rem}
  .logo{max-width:480px;height:auto;display:block;margin:0 auto}
  .wrap{padding:1.5rem;max-width:480px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
  .lbl{font-size:26px;color:var(--color-text-secondary);margin-bottom:8px}
  .btn{
    width:100%;padding:20px 18px;border-radius:12px;
    border:1px solid var(--color-border-secondary);
    background:transparent;
    color:var(--color-text-primary);font-size:30px;font-weight:500;
    cursor:pointer;transition:background 0.12s,border-color 0.12s,transform 0.12s,box-shadow 0.12s,color 0.12s;
    box-shadow:0 6px 18px rgb(255, 0, 0);
  }
  .btn:hover:not(:disabled){background:transparent;transform:translateY(-3px);box-shadow:0 10px 24px rgba(255, 0, 0)}
  .btn:disabled{opacity:0.35;cursor:not-allowed}
  .btn.sel{
    background:transparent;
    border-color:var(--color-border-success);
    color:var(--color-text-success);
  }
  .btn.danger{
    background:transparent;
    border-color:var(--color-border-danger);
    color:var(--color-text-danger);
    cursor:not-allowed;
  }
  .tank-meta{font-size:26px;color:var(--color-text-secondary);margin-top:5px}
  .bar-wrap{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-top:6px;overflow:hidden}
  .bar{height:100%;border-radius:2px;transition:width 0.4s}
  .dispatch{
    width:100%;padding:20px 24px;border-radius:calc(var(--border-radius-md) + 4px);
    border:1px solid var(--color-border-secondary);
    background:transparent;
    color:var(--color-text-primary);font-size:32px;font-weight:600;
    cursor:pointer;transition:color 0.12s,border-color 0.12s,transform 0.12s,box-shadow 0.12s;margin-bottom:1.25rem;
    box-shadow:0 8px 22px rgba(255, 0, 0);
  }
  .dispatch:hover:not(:disabled){background:transparent;transform:translateY(-4px);box-shadow:0 14px 30px rgba(255, 0, 0)}
  .dispatch:disabled{opacity:0.3;cursor:not-allowed}
  .dispatch.ready{
    background:transparent;
    border-color:var(--color-border-success);
    color:var(--color-text-success);
  }
  .alert{
    padding:10px 12px;border-radius:var(--border-radius-md);
    background:var(--color-background-danger);
    border:0.5px solid var(--color-border-danger);
    color:var(--color-text-danger);font-size:28px;
    margin-bottom:1.25rem;display:none;
    display:flex;align-items:center;gap:8px;
  }
  .alert.hidden{display:none}
  .slider-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
  .slider-row label{font-size:28x;color:var(--color-text-secondary);white-space:nowrap}
  .slider-row input{flex:1}
  .slider-row span{font: size 28px;;font-weight:500;color:var(--color-text-primary);min-width:36px;text-align:right}
  .refill-row{display:flex;gap:8px;margin-top:0.5rem}
  .refill-btn{
    padding:10px 16px;border-radius:10px;
    border:1px solid var(--color-border-secondary);
    background:transparent;
    color:var(--color-text-secondary);font-size:26px;cursor:pointer;
    box-shadow:0 6px 14px rgba(255, 0, 0);transition:color 0.12s,transform 0.12s,box-shadow 0.12s;
  }
  .refill-btn:hover{background:transparent;transform:translateY(-2px);box-shadow:0 10px 20px rgba(255, 0, 0);color:var(--color-text-primary)}
  .repo-link{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);font-size:12px;color:var(--color-text-secondary);opacity:0.85}
  .repo-link a{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255, 0, 0);padding-bottom:2px}
  .repo-link a:hover{text-decoration:underline;opacity:1}

  .bottle-area{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  z-index:1;
}

.bottle-area.left{left:40px}
.bottle-area.right{right:40px}


.bottle{
  width:90px;
  height:300px;
  border:3px solid var(--color-border-secondary);
  border-radius:18px 18px 12px 12px;
  position:relative;
  overflow:hidden;
  background:rgba(255,255,255,0.04);
  box-shadow:0 8px 24px rgba(255,0,0,0.45);
}

.bottle-label{
  font-size:24px;
  font-family:'Nosifer', cursive;
}

.bottle-area.left .bottle-label{
  color:#D3F527;
}

  .bottle-area.left .bottle{
    border-color:#D3F527;
  }

  .bottle-area.left .bottle-fill{
    background:rgba(253, 160, 153, 0.85);
  }

  .bottle-area.right .bottle-label{
    color:#27F5B4;
  }

  .bottle-area.right .bottle{
    border-color:#27F5B4;
  }

  .bottle-area.right .bottle-fill{
    background:rgba(253, 160, 153, 0.85);
  }

.bottle-fill{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:100%;
  background:var(--color-text-success);
  transition:height 0.4s linear, background 0.3s linear;
}

.bottle-neck{
  width:42px;
  height:28px;
  border:3px solid var(--color-border-secondary);
  border-bottom:none;
  border-radius:10px 10px 0 0;
}

</style>

<div class="bottle-area left">
  <div class="bottle-label">Tank A</div>
  <div class="bottle-neck"></div>
  <div class="bottle">
    <div class="bottle-fill" id="bottle-fill-A"></div>
  </div>
</div>

<div class="bottle-area right">
  <div class="bottle-label">Tank B</div>
  <div class="bottle-neck"></div>
  <div class="bottle">
    <div class="bottle-fill" id="bottle-fill-B"></div>
  </div>
</div>

<div class="wrap">
  <div class="logo-wrap">
    <img src="/static/logo.png" alt="Logo" class="logo">
  </div>
  <div id="alert-box" class="alert hidden">
    <i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:32px;flex-shrink:0"></i>
    <span id="alert-txt"></span>
  </div>

  <div class="lbl">Tank</div>
  <div class="row" id="tank-row">
    <div>
      <button class="btn" id="btn-A" onclick="pickTank('A')">Tank A</button>
      <div class="bar-wrap"><div class="bar" id="bar-A" style="width:100%;background:var(--color-text-success)"></div></div>
      <div class="tank-meta" id="meta-A">1.5 L</div>
    </div>
    <div>
      <button class="btn" id="btn-B" onclick="pickTank('B')">Tank B</button>
      <div class="bar-wrap"><div class="bar" id="bar-B" style="width:100%;background:var(--color-text-success)"></div></div>
      <div class="tank-meta" id="meta-B">1.5 L</div>
    </div>
  </div>

  <div class="lbl">Mode</div>
  <div class="row" id="mode-row">
    <button class="btn" id="btn-auto" disabled onclick="pickMode('auto')">Auto (0.3 L)</button>
    <button class="btn" id="btn-manual" disabled onclick="pickMode('manual')">Manual</button>
  </div>

  <div id="slider-wrap" style="display:none">
    <div class="slider-row">
      <label>Amount</label>
      <input type="range" id="slider" min="0.1" max="1.5" step="0.1" value="0.3" oninput="onSlide()">
      <span id="slider-out">0.3 L</span>
    </div>
  </div>

  <button
  class="dispatch"
  id="dispatch"
  disabled
  onclick="dispatchAction(event)"
  onmousedown="manualPressStart()"
  onmouseup="manualPressStop()"
  onmouseleave="manualPressStop()"
  ontouchstart="manualPressStart(event)"
  ontouchend="manualPressStop(event)"
>
  Dispense
</button>

  <div id="refill-wrap" style="display:none">
    <div class="lbl">Refill tank</div>
    <div class="refill-row">
      <button class="refill-btn" onclick="refill('A')"><i class="ti ti-plus" aria-hidden="true"></i> Tank A</button>
      <button class="refill-btn" onclick="refill('B')"><i class="ti ti-plus" aria-hidden="true"></i> Tank B</button>
    </div>
  </div>
</div>

<div class="repo-link"><a href="https://github.com/VasilisOuzas/ECE490-DrFresh" target="_blank" rel="noopener noreferrer">GitHub — ECE490-DrFresh</a></div>

<script>
const MAX=1.5,MIN=0.1,DEF=0.3,FLOW=0.03;
let vols={A:MAX,B:MAX},tank=null,mode=null;

function barColor(p){
  if(p > 0.25) return '#27F5B4';
  if(p > 0.1) return '#F5C542';
  return '#F52727';
}
}

function canDispense(t){
  return vols[t] > 0;
}

function renderTank(t){
  const p = Math.max(0, Math.min(1, vols[t] / MAX));

  const bar = document.getElementById('bar-' + t);
  const meta = document.getElementById('meta-' + t);
  const btn = document.getElementById('btn-' + t);
  const bottleFill = document.getElementById('bottle-fill-' + t);

  bar.style.width = (p * 100).toFixed(1) + '%';
  bar.style.background = barColor(p);

  bottleFill.style.height = (p * 100).toFixed(1) + '%';
  bottleFill.style.background = barColor(p);

  meta.textContent = vols[t].toFixed(2) + ' L';

  btn.disabled = !canDispense(t);
  btn.className = 'btn' + (tank === t ? ' sel' : '') + ((!canDispense(t) && tank !== t) ? ' danger' : '');
}

function showAlert(msg){
  const b=document.getElementById('alert-box');
  document.getElementById('alert-txt').textContent=msg;
  b.classList.toggle('hidden',!msg);
}

function checkAlert(){
  const aOk=canDispense('A'),bOk=canDispense('B');
  if(!aOk&&!bOk){showAlert('Both tanks are empty or too low. Please refill before dispensing.');return;}
  if(!aOk)showAlert('Tank A is too low to dispense. Refill or use Tank B.');
  else if(!bOk)showAlert('Tank B is too low to dispense. Refill or use Tank A.');
  else showAlert('');
  document.getElementById('refill-wrap').style.display=(!aOk||!bOk)?'block':'none';
}

function pickTank(t){
  if(!canDispense(t))return;
  tank=t;
  renderTank('A');renderTank('B');
  document.getElementById('btn-auto').disabled=false;
  document.getElementById('btn-manual').disabled=false;
  syncDispatch();
}

function pickMode(m){
  mode = m;

  document.getElementById('btn-auto').className = 'btn' + (m === 'auto' ? ' sel' : '');
  document.getElementById('btn-manual').className = 'btn' + (m === 'manual' ? ' sel' : '');

  document.getElementById('slider-wrap').style.display = 'none';

  syncDispatch();
}
function onSlide(){
  const v=parseFloat(document.getElementById('slider').value);
  document.getElementById('slider-out').textContent=v.toFixed(1)+' L';
  syncDispatch();
}

function getAmount(){
  if(mode === 'auto') return DEF;
  return null;
}

function syncDispatch(){
  const btn = document.getElementById('dispatch');
  const ready = tank && mode;

  btn.disabled = !ready;
  btn.className = 'dispatch' + (ready ? ' ready' : '');

  if(!ready){
    btn.textContent = 'Dispense';
    return;
  }

  if(mode === 'auto'){
    btn.textContent = `Dispense ${DEF.toFixed(1)} L from Tank ${tank}`;
  } else {
    btn.textContent = `Hold the Button to dispense from Tank ${tank}`;
  }
}

let manualActive = false;
let manualTimer = null;
let manualStartTime = null;

async function sendDispenseCommand(payload){
  const res = await fetch('/api/dispense', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if(!res.ok || data.status !== 'success'){
    throw new Error(data.message || 'Dispense command failed.');
  }

  return data;
}

async function autoDispense(){
  if(!tank || mode !== 'auto') return;

  const btn = document.getElementById('dispatch');

  btn.disabled = true;
  btn.className = 'dispatch';
  btn.textContent = 'Dispensing…';

  try {
    await sendDispenseCommand({
      tank: tank,
      type: 'auto'
    });
  } catch(err) {
    showAlert(err.message || 'Could not contact backend.');
  }

  syncDispatch();
}

function manualPressStart(event){
  if(event) event.preventDefault();

  if(!tank || mode !== 'manual') return;
  if(manualActive) return;

  manualActive = true;
  manualStartTime = Date.now();

  const btn = document.getElementById('dispatch');
  btn.disabled = false;
  btn.className = 'dispatch ready';
  btn.textContent = `Manual dispensing from Tank ${tank}…`;

  sendManualPulse();

  manualTimer = setInterval(sendManualPulse, 250);
}

function manualPressStop(event){
  if(event) event.preventDefault();

  if(!manualActive) return;

  manualActive = false;

  if(manualTimer !== null){
    clearInterval(manualTimer);
    manualTimer = null;
  }

  const elapsed = (Date.now() - manualStartTime) / 1000;
  manualStartTime = null;

  const estimatedAmount = elapsed * FLOW;

  const btn = document.getElementById('dispatch');
  btn.textContent = `Dispensed about ${estimatedAmount.toFixed(2)} L`;
  btn.className = 'dispatch';

  setTimeout(() => {
    syncDispatch();
  }, 700);
}

async function sendManualPulse(){
  if(!manualActive || !tank || mode !== 'manual') return;

  try {
    await sendDispenseCommand({
      tank: tank,
      type: 'manual'
    });
  } catch(err) {
    manualPressStop();
    showAlert(err.message || 'Manual dispense failed.');
  }
}

async function refill(t){
  try {
    const res = await fetch('/api/refill', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        tank: t,
        volume: MAX
      })
    });

    const data = await res.json();

    if (!res.ok || data.status !== 'success') {
      showAlert(data.message || 'Refill failed.');
      return;
    }

    showAlert('');

  } catch (err) {
    showAlert('Could not contact backend.');
  }
}

function connectStatusStream(){
  const es = new EventSource('/api/stream');

  es.onmessage = function(event){
    const data = JSON.parse(event.data);

    if (data.tanks) {
      vols.A = data.tanks.A ?? vols.A;
      vols.B = data.tanks.B ?? vols.B;

      renderTank('A');
      renderTank('B');
      checkAlert();
      syncDispatch();
    }

    if (data.alert) {
      showAlert(data.alert);
    }
  };

  es.onerror = function(){
    showAlert('⚠️Lost connection with backend.⚠️');
  };
}

renderTank('A');
renderTank('B');
checkAlert();
connectStatusStream();
</script>
