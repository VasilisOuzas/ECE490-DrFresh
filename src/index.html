
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  .wrap{padding:1.5rem;max-width:480px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
  .lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:8px}
  .btn{
    width:100%;padding:12px;border-radius:var(--border-radius-md);
    border:0.5px solid var(--color-border-secondary);
    background:var(--color-background-primary);
    color:var(--color-text-primary);font-size:14px;font-weight:500;
    cursor:pointer;transition:background 0.15s,border-color 0.15s;
  }
  .btn:hover:not(:disabled){background:var(--color-background-secondary)}
  .btn:disabled{opacity:0.35;cursor:not-allowed}
  .btn.sel{
    background:var(--color-background-success);
    border-color:var(--color-border-success);
    color:var(--color-text-success);
  }
  .btn.danger{
    background:var(--color-background-danger);
    border-color:var(--color-border-danger);
    color:var(--color-text-danger);
    cursor:not-allowed;
  }
  .tank-meta{font-size:12px;color:var(--color-text-secondary);margin-top:5px}
  .bar-wrap{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-top:6px;overflow:hidden}
  .bar{height:100%;border-radius:2px;transition:width 0.4s}
  .dispatch{
    width:100%;padding:14px;border-radius:var(--border-radius-md);
    border:0.5px solid var(--color-border-secondary);
    background:var(--color-background-primary);
    color:var(--color-text-primary);font-size:14px;font-weight:500;
    cursor:pointer;transition:background 0.15s;margin-bottom:1.25rem;
  }
  .dispatch:hover:not(:disabled){background:var(--color-background-secondary)}
  .dispatch:disabled{opacity:0.3;cursor:not-allowed}
  .dispatch.ready{
    background:var(--color-background-success);
    border-color:var(--color-border-success);
    color:var(--color-text-success);
  }
  .alert{
    padding:10px 12px;border-radius:var(--border-radius-md);
    background:var(--color-background-danger);
    border:0.5px solid var(--color-border-danger);
    color:var(--color-text-danger);font-size:13px;
    margin-bottom:1.25rem;display:none;
    display:flex;align-items:center;gap:8px;
  }
  .alert.hidden{display:none}
  .slider-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
  .slider-row label{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
  .slider-row input{flex:1}
  .slider-row span{font-size:13px;font-weight:500;color:var(--color-text-primary);min-width:36px;text-align:right}
  .refill-row{display:flex;gap:8px;margin-top:0.5rem}
  .refill-btn{
    padding:7px 14px;border-radius:var(--border-radius-md);
    border:0.5px solid var(--color-border-secondary);
    background:var(--color-background-secondary);
    color:var(--color-text-secondary);font-size:12px;cursor:pointer;
  }
  .refill-btn:hover{background:var(--color-background-tertiary)}
</style>

<div class="wrap">
  <div id="alert-box" class="alert hidden">
    <i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:16px;flex-shrink:0"></i>
    <span id="alert-txt"></span>
  </div>

  <div class="lbl">Tank</div>
  <div class="row" id="tank-row">
    <div>
      <button class="btn" id="btn-A" onclick="pickTank('A')">Tank A</button>
      <div class="bar-wrap"><div class="bar" id="bar-A" style="width:100%;background:var(--color-text-success)"></div></div>
      <div class="tank-meta" id="meta-A">1.5 L</div>
    </div>
    <div>
      <button class="btn" id="btn-B" onclick="pickTank('B')">Tank B</button>
      <div class="bar-wrap"><div class="bar" id="bar-B" style="width:100%;background:var(--color-text-success)"></div></div>
      <div class="tank-meta" id="meta-B">1.5 L</div>
    </div>
  </div>

  <div class="lbl">Mode</div>
  <div class="row" id="mode-row">
    <button class="btn" id="btn-auto" disabled onclick="pickMode('auto')">Auto (0.3 L)</button>
    <button class="btn" id="btn-manual" disabled onclick="pickMode('manual')">Manual</button>
  </div>

  <div id="slider-wrap" style="display:none">
    <div class="slider-row">
      <label>Amount</label>
      <input type="range" id="slider" min="0.1" max="1.5" step="0.1" value="0.3" oninput="onSlide()">
      <span id="slider-out">0.3 L</span>
    </div>
  </div>

  <button class="dispatch" id="dispatch" disabled onclick="dispense()">Dispense</button>

  <div id="refill-wrap" style="display:none">
    <div class="lbl">Refill tank</div>
    <div class="refill-row">
      <button class="refill-btn" onclick="refill('A')"><i class="ti ti-plus" aria-hidden="true"></i> Tank A</button>
      <button class="refill-btn" onclick="refill('B')"><i class="ti ti-plus" aria-hidden="true"></i> Tank B</button>
    </div>
  </div>
</div>

<script>
const MAX=1.5,MIN=0.1,DEF=0.3,FLOW=0.5;
let vols={A:MAX,B:MAX},tank=null,mode=null;

function barColor(p){
  if(p>0.25)return'var(--color-text-success)';
  if(p>0.1)return'var(--color-text-warning)';
  return'var(--color-text-danger)';
}

function canDispense(t){return vols[t]>=DEF}

function renderTank(t){
  const p=vols[t]/MAX;
  const bar=document.getElementById('bar-'+t);
  const meta=document.getElementById('meta-'+t);
  const btn=document.getElementById('btn-'+t);
  bar.style.width=(p*100).toFixed(1)+'%';
  bar.style.background=barColor(p);
  meta.textContent=vols[t].toFixed(2)+' L';
  btn.disabled=!canDispense(t);
  btn.className='btn'+(tank===t?' sel':'')+((!canDispense(t)&&tank!==t)?' danger':'');
}

function showAlert(msg){
  const b=document.getElementById('alert-box');
  document.getElementById('alert-txt').textContent=msg;
  b.classList.toggle('hidden',!msg);
}

function checkAlert(){
  const aOk=canDispense('A'),bOk=canDispense('B');
  if(!aOk&&!bOk){showAlert('Both tanks are empty or too low. Please refill before dispensing.');return;}
  if(!aOk)showAlert('Tank A is too low to dispense. Refill or use Tank B.');
  else if(!bOk)showAlert('Tank B is too low to dispense. Refill or use Tank A.');
  else showAlert('');
  document.getElementById('refill-wrap').style.display=(!aOk||!bOk)?'block':'none';
}

function pickTank(t){
  if(!canDispense(t))return;
  tank=t;
  renderTank('A');renderTank('B');
  document.getElementById('btn-auto').disabled=false;
  document.getElementById('btn-manual').disabled=false;
  syncDispatch();
}

function pickMode(m){
  mode=m;
  document.getElementById('btn-auto').className='btn'+(m==='auto'?' sel':'');
  document.getElementById('btn-manual').className='btn'+(m==='manual'?' sel':'');
  document.getElementById('slider-wrap').style.display=m==='manual'?'block':'none';
  if(m==='manual'){
    const s=document.getElementById('slider');
    s.max=vols[tank].toFixed(1);
    if(parseFloat(s.value)>vols[tank])s.value=vols[tank].toFixed(1);
    document.getElementById('slider-out').textContent=parseFloat(s.value).toFixed(1)+' L';
  }
  syncDispatch();
}

function onSlide(){
  const v=parseFloat(document.getElementById('slider').value);
  document.getElementById('slider-out').textContent=v.toFixed(1)+' L';
  syncDispatch();
}

function getAmount(){
  if(mode==='auto')return DEF;
  return parseFloat(document.getElementById('slider').value);
}

function syncDispatch(){
  const btn=document.getElementById('dispatch');
  const ready=tank&&mode;
  btn.disabled=!ready;
  btn.className='dispatch'+(ready?' ready':'');
  if(ready){
    btn.textContent=`Dispense ${getAmount().toFixed(1)} L from Tank ${tank}`;
  } else {
    btn.textContent='Dispense';
  }
}

async function dispense(){
  if(!tank || !mode) return;

  const amt = getAmount();
  const btn = document.getElementById('dispatch');

  btn.disabled = true;
  btn.className = 'dispatch';
  btn.textContent = 'Sending command...';

  try {
    const res = await fetch('/api/dispense', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        tank: tank,
        type: mode,
        amount: amt
      })
    });

    const data = await res.json();

    if (!res.ok || data.status !== 'success') {
      showAlert(data.message || 'Dispense command failed.');
      syncDispatch();
      return;
    }

    btn.textContent = 'Dispensing…';

  } catch (err) {
    showAlert('Could not contact backend.');
    syncDispatch();
  }
}

async function refill(t){
  try {
    const res = await fetch('/api/refill', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        tank: t,
        volume: MAX
      })
    });

    const data = await res.json();

    if (!res.ok || data.status !== 'success') {
      showAlert(data.message || 'Refill failed.');
      return;
    }

    showAlert('');

  } catch (err) {
    showAlert('Could not contact backend.');
  }
}

function connectStatusStream(){
  const es = new EventSource('/api/stream');

  es.onmessage = function(event){
    const data = JSON.parse(event.data);

    if (data.tanks) {
      vols.A = data.tanks.A ?? vols.A;
      vols.B = data.tanks.B ?? vols.B;

      renderTank('A');
      renderTank('B');
      checkAlert();
      syncDispatch();
    }

    if (data.alert) {
      showAlert(data.alert);
    }
  };

  es.onerror = function(){
    showAlert('Lost connection with backend.');
  };
}

renderTank('A');
renderTank('B');
checkAlert();
connectStatusStream();
</script>
